<!DOCTYPE html>
<html>
<head>
    <title>Emotion AI Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            text-align: center;
        }

        .header {
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: rgba(255,255,255,0.06);
            padding: 15px;
            border-radius: 18px;
            width: 750px;
            max-width: 95%;
        }

        img {
            width: 100%;
            border-radius: 12px;
        }

        /* PANEL */
        .panel {
            margin-top: 20px;
            width: 750px;
            max-width: 95%;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.06);
            text-align: left;
        }

        .label {
            color: #a5b4fc;
            font-weight: bold;
        }

        .title {
            color: #38bdf8;
            margin-bottom: 10px;
            font-size: 18px;
        }

        /* ANIMATION */
        .fade {
            transition: all 0.4s ease;
        }

        .hide {
            opacity: 0.2;
            transform: translateY(5px);
        }

        .badge {
            background: #22c55e;
            color: black;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        😃 Emotion AI Dashboard <span class="badge">LIVE</span>
    </div>

    <div class="container">

        <div class="card">
            <img src="{{ url_for('video') }}">
        </div>

        <div class="panel fade" id="panel">

            <div class="title">🧠 Live Emotion Analysis</div>

            <div><span class="label">Emotion:</span> <span id="emotion">--</span></div>
            <div><span class="label">Confidence:</span> <span id="confidence">--</span>%</div>

            <hr style="opacity:0.2; margin:10px 0;">

            <div><span class="label">💬 Quote:</span></div>
            <div id="quote">--</div>

            <br>

            <div><span class="label">🎮 Activity:</span></div>
            <div id="activity">--</div>

        </div>

    </div>

    <script>
        function updateEmotion() {
            const panel = document.getElementById("panel");

            panel.classList.add("hide");

            fetch("/emotion_data")
            .then(res => res.json())
            .then(data => {

                setTimeout(() => {
                    document.getElementById("emotion").innerText = data.emotion;
                    document.getElementById("confidence").innerText = data.confidence;

                    document.getElementById("quote").innerText = data.quote;
                    document.getElementById("activity").innerText = data.activity;

                    panel.classList.remove("hide");

                }, 200);
            });
        }

        setInterval(updateEmotion, 1000);
    </script>

</body>
</html>
